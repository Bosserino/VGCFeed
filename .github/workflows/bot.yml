name: x-telegram-bot
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: x-telegram-bot
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Debug accounts
        run: |
          echo "--- hex dump prime 5 righe ---"
          head -5 accounts.txt | xxd
          echo "--- righe non-commento ---"
          grep -v "^#" accounts.txt | grep -v "^$"
      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_COOKIES: ${{ secrets.X_COOKIES }}
        run: python main.py
      - name: Save state (seen.json)
